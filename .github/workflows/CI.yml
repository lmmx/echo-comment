name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux targets
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            name: echo-comment-x86_64-unknown-linux-gnu.tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-22.04
            name: echo-comment-x86_64-unknown-linux-musl.tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            name: echo-comment-aarch64-unknown-linux-gnu.tar.gz
          - target: armv7-unknown-linux-gnueabihf
            os: ubuntu-22.04
            name: echo-comment-armv7-unknown-linux-gnueabihf.tar.gz
          
          # macOS targets
          - target: x86_64-apple-darwin
            os: macos-13
            name: echo-comment-x86_64-apple-darwin.tar.gz
          - target: aarch64-apple-darwin
            os: macos-14
            name: echo-comment-aarch64-apple-darwin.tar.gz
          
          # Windows targets
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: echo-comment-x86_64-pc-windows-msvc.zip
          - target: i686-pc-windows-msvc
            os: windows-latest
            name: echo-comment-i686-pc-windows-msvc.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Linux cross-compilation setup
      - name: Install cross-compilation tools (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          case ${{ matrix.target }} in
            x86_64-unknown-linux-musl)
              sudo apt-get update
              sudo apt-get install -y musl-tools
              ;;
            aarch64-unknown-linux-gnu)
              sudo apt-get update
              sudo apt-get install -y gcc-aarch64-linux-gnu
              ;;
            armv7-unknown-linux-gnueabihf)
              sudo apt-get update
              sudo apt-get install -y gcc-arm-linux-gnueabihf
              ;;
          esac

      # Windows 32-bit setup
      - name: Setup 32-bit target (Windows)
        if: matrix.target == 'i686-pc-windows-msvc'
        run: rustup target add i686-pc-windows-msvc

      - name: Build
        run: |
          case ${{ matrix.target }} in
            aarch64-unknown-linux-gnu)
              export CC=aarch64-linux-gnu-gcc
              export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
              ;;
            armv7-unknown-linux-gnueabihf)
              export CC=arm-linux-gnueabihf-gcc
              export CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER=arm-linux-gnueabihf-gcc
              ;;
          esac
          cargo build --release --target ${{ matrix.target }}

      - name: Package binaries (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.name }} echo-comment comment-echo
          cd ../../..

      - name: Package binaries (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../${{ matrix.name }} echo-comment.exe comment-echo.exe
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    name: Create Release
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Move artifacts to release directory
        run: |
          mkdir -p release
          find artifacts -name "*.tar.gz" -o -name "*.zip" | while read file; do
            cp "$file" release/
          done

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > checksums.txt

      - name: Extract release notes
        id: extract_notes
        run: |
          # Extract version from tag
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          # Extract release notes from CHANGELOG.md
          awk -v version="$VERSION" '
          /^## \[/ {
            if (found) exit
            if (index($0, version)) {
              found = 1
              next
            }
            next
          }
          found && /^## \[/ { exit }
          found && !/^$/ { print }
          ' CHANGELOG.md > release_notes.txt
          
          # If no release notes found, use a default message
          if [ ! -s release_notes.txt ]; then
            echo "Release $VERSION" > release_notes.txt
            echo "" >> release_notes.txt
            echo "See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/master/CHANGELOG.md) for details." >> release_notes.txt
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          body_path: release_notes.txt
          name: Release ${{ steps.extract_notes.outputs.version }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
